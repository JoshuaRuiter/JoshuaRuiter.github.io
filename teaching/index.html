<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Joshua Ruiter - Personal Website</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        nav {
            margin-bottom: 15px;
        }
        nav a {
            margin-right: 10px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
            display: inline-block;
            /* Box styling elements */
            padding: 6px 12px;
            border-radius: 4px;
            background-color: #f0f4f8;
            transition: background-color 0.2s, color 0.2s;
        }
        nav a:hover {
            /* Highlight interaction elements */
            text-decoration: none;
            background-color: #0066cc;
            color: #fff;
        }
        main {
            margin-top: 40px;
        }
        /* Style for links inside the main text body */
        main a {
            color: #0066cc;
            text-decoration: none;
        }
        main a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1> Joshua Ruiter </h1>
        <!-- Relative links pointing to the subfolder index files -->
        <nav>
            <a href="/">Home</a>
            <a href="/research/">Research</a>
            <a href="/teaching/">Teaching</a>
            <a href="/other-projects/">Other Projects</a>
        </nav>
    </header>

    <main>
        <h2>Teaching</h2>
        <p>Teaching stuff</p>
    </main>

    <footer>
        <hr>
        <p>&copy; 2026 Joshua Ruiter</p>
    </footer>

</body>
</html>
